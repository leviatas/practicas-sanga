# ============================================================================
# Docker Compose — Prácticas Sanga
#
# Producción (build + deploy):
#   ./prod.sh                 # pregunta el puerto y lo guarda en .env
#   docker compose up -d --build
#   → disponible en http://localhost:<PORT>
#
# El puerto del host se toma de la variable PORT, que ./prod.sh escribe en el
# archivo .env (ignorado por git). Si no hay .env, usa 8080 por defecto.
# También podés forzarlo puntualmente:  PORT=3000 docker compose up -d --build
# ============================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: practicas-sanga:latest
    container_name: practicas-sanga
    ports:
      - "${PORT:-8080}:80"
    restart: unless-stopped
