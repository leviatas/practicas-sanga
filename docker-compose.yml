# ============================================================================
# Docker Compose — Prácticas Sanga
#
# Producción (build + deploy):
#   ./prod.sh                 # elige el puerto y lo guarda en .env
#   docker compose up -d --build
#   → disponible en http://localhost:<PORT>
#
# El puerto del host se toma de la variable PORT, que ./prod.sh escribe en el
# archivo .env (ignorado por git). Si no hay .env, usa 8080 por defecto.
# También podés forzarlo puntualmente:  PORT=3000 docker compose up -d --build
#
# Exponer a internet (Cloudflare Tunnel):
#   Poné CLOUDFLARED_TOKEN=... en .env y ./prod.sh levanta también el túnel.
#   Manualmente:  docker compose --profile tunnel up -d --build
# ============================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: practicas-sanga:latest
    container_name: practicas-sanga
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Backend de logs de uso (Node + SQLite). nginx le hace proxy en /api.
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: practicas-sanga-backend:latest
    container_name: practicas-sanga-backend
    environment:
      - LOGS_PASSWORD=${LOGS_PASSWORD:-Sanga70}
      - DB_PATH=/data/usage.db
    volumes:
      - sanga-db:/data
    restart: unless-stopped

  # Túnel de Cloudflare (opcional). Solo se levanta con el profile "tunnel",
  # que ./prod.sh activa automáticamente si hay CLOUDFLARED_TOKEN en .env.
  # En el panel de Cloudflare (Zero Trust > Networks > Tunnels) configurá el
  # public hostname apuntando al servicio interno:  http://web:80
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: practicas-sanga-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN:-}
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  # Persiste la base SQLite de logs entre reinicios/recreaciones.
  sanga-db:
