name: Deploy (self-hosted)

# Cada vez que se sube algo a main, se despliega en el servidor propio.
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

# Evita despliegues solapados: si llega otro push, espera a que termine el actual.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy con prod.sh
        shell: bash
        run: |
          set -euo pipefail
          DIR="$HOME/proyectos/sanga/practicas-sanga"
          if [ ! -d "$DIR/.git" ]; then
            echo "❌ No existe el repo en $DIR. Cloná el proyecto ahí primero." >&2
            exit 1
          fi
          cd "$DIR"
          # prod.sh hace git pull, elige el puerto, buildea y levanta (y el túnel si hay token).
          ./prod.sh
